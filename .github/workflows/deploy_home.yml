# .github/workflows/deploy-home.yml
name: Deploy Home to AWS

on:
  push:
    branches: [home]
  pull_request:
    branches: [home]

env:
  NODE_VERSION: '18'
  BUN_VERSION: 'latest'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/home'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build home application
        run: |
          cd apps/home
          echo "🏗️ Building Next.js application..."
          bun run build

          echo "📁 Checking standalone build:"
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build found"
            ls -la .next/standalone/
          else
            echo "❌ Standalone build not found"
            echo "Available files in .next:"
            ls -la .next/
            exit 1
          fi

          echo "📁 Preparing deployment package..."
          # 배포용 폴더 구성
          mkdir -p ../../dist/apps/home

          # Standalone 파일들 복사
          cp -r .next/standalone/* ../../dist/apps/home/

          # Static 파일들 복사
          if [ -d ".next/static" ]; then
            mkdir -p ../../dist/apps/home/.next
            cp -r .next/static ../../dist/apps/home/.next/
          fi

          # Public 파일들 복사
          if [ -d "public" ]; then
            cp -r public ../../dist/apps/home/
          fi

          echo "📁 Final deployment package:"
          ls -la ../../dist/apps/home/

          echo "📊 Package size:"
          du -sh ../../dist/apps/home/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 동적 Next.js 앱을 위한 배포 (EC2)
      - name: Deploy to AWS S3 (for file storage)
        run: |
          echo "🚀 Uploading build to S3..."

          # 타임스탬프 생성
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BUILD_PATH="builds/$TIMESTAMP"

          # S3에 빌드 파일 업로드
          aws s3 sync dist/apps/home s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/ \
            --delete \
            --quiet

          echo "✅ Build uploaded to s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/"

          # 최신 빌드 경로를 별도 파일로 저장
          echo "$BUILD_PATH" | aws s3 cp - s3://${{ secrets.HOME_S3_BUCKET_NAME }}/latest-build.txt

          echo "📝 Latest build path saved"

      # EC2 인스턴스에 배포 명령 전송
      - name: Deploy to EC2
        run: |
          echo "🚀 Deploying to EC2..."

          # SSM을 통해 EC2에서 배포 스크립트 실행
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.HOME_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "#!/bin/bash",
              "set -e",
              
              "# ubuntu 사용자로 전환하여 실행",
              "sudo -u ubuntu bash << '\''USERSCRIPT'\''",
              "set -e",
              "echo \"Starting deployment as ubuntu user...\"",
              "cd /home/ubuntu/app",
              
              "# S3에서 최신 빌드 경로 가져오기",
              "BUILD_PATH=$(aws s3 cp s3://${{ secrets.HOME_S3_BUCKET_NAME }}/latest-build.txt -)",
              "echo \"Downloading build: $BUILD_PATH\"",
              
              "# 기존 빌드 백업 및 새 빌드 다운로드",
              "rm -rf current-build.bak",
              "if [ -d \"current-build\" ]; then mv current-build current-build.bak; fi",
              "mkdir -p current-build",
              
              "# S3에서 새 빌드 다운로드",
              "aws s3 sync s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/ ./current-build/",
              
              "# 의존성 설치",
              "cd current-build",
              "echo \"Installing production dependencies...\"",
              "npm install --production --silent",
              
              "# 서버 파일 확인",
              "echo \"Checking server files...\"",
              "if [ -f \"server.js\" ]; then",
              "  echo \"✅ server.js found\"",
              "elif [ -f \"apps/home/server.js\" ]; then",
              "  echo \"✅ apps/home/server.js found\"",
              "else",
              "  echo \"❌ No server.js found. Available JS files:\"",
              "  find . -name \"*.js\" -type f | head -20",
              "fi",
              
              "# PM2로 앱 재시작",
              "echo \"Restarting application with PM2...\"",
              "pm2 stop home-app 2>/dev/null || true",
              "pm2 delete home-app 2>/dev/null || true",
              
              "# 앱 시작",
              "if [ -f \"server.js\" ]; then",
              "  PORT=3000 pm2 start server.js --name home-app --update-env",
              "elif [ -f \"apps/home/server.js\" ]; then",
              "  PORT=3000 pm2 start apps/home/server.js --name home-app --update-env",
              "else",
              "  echo \"Starting with npm start...\"",
              "  PORT=3000 pm2 start npm --name home-app -- start",
              "fi",
              
              "# PM2 설정 저장",
              "pm2 save",
              
              "echo \"✅ Deployment completed\"",
              "pm2 status",
              "USERSCRIPT"
            ]' \
            --comment "Deploy home application to Ubuntu" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "✅ Deployment command sent to EC2. Command ID: $COMMAND_ID"

          # 명령 실행 상태 확인
          echo "⏳ Waiting for deployment to complete..."
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")
            
            echo "Deployment status: $STATUS (check $i/30)"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment completed successfully"
              # 성공 시 로그 출력
              echo "📝 Deployment output:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' \
                --output text
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Deployment failed"
              echo "📝 Error output:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardErrorContent' \
                --output text
              echo "📝 Standard output:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' \
                --output text
              exit 1
            elif [ "$STATUS" = "TimedOut" ]; then
              echo "⏰ Deployment timed out"
              exit 1
            fi
            
            sleep 20
          done

      # 배포 결과 확인
      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."

          # 잠시 대기 (앱 시작 시간)
          sleep 15

          # Health check
          if [ -n "${{ secrets.HOME_APP_URL }}" ]; then
            echo "Checking app health at ${{ secrets.HOME_APP_URL }}"
            for i in {1..10}; do
              if curl -f -s -o /dev/null "${{ secrets.HOME_APP_URL }}"; then
                echo "✅ App is healthy and responding"
                echo "🌐 App is live at: ${{ secrets.HOME_APP_URL }}"
                break
              else
                echo "⏳ Waiting for app to start... (attempt $i/10)"
                if [ $i -eq 10 ]; then
                  echo "❌ App health check failed after 10 attempts"
                  echo "Check EC2 logs: sudo pm2 logs home-app"
                  exit 1
                fi
                sleep 10
              fi
            done
          else
            echo "⚠️ HOME_APP_URL not set, skipping health check"
          fi

          echo "🎉 Deployment completed successfully!"

  # 테스트 작업 (PR용)
  test-home:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run home linting
        continue-on-error: true
        run: |
          echo "🔍 Linting home application..."
          if bunx nx lint home --help > /dev/null 2>&1; then
            echo "Running home linting..."
            bunx nx lint home
          else
            echo "ℹ️ No linting configured for home app"
          fi

      - name: Build check for home
        run: |
          echo "🏗️ Build check for home application..."
          cd apps/home
          bun run build

          if [ -d ".next/standalone" ]; then
            echo "✅ Home build check passed"
            echo "📁 Build output:"
            ls -la .next/standalone/
          else
            echo "❌ Home build check failed"
            echo "📁 Available files in .next:"
            ls -la .next/
            exit 1
          fi
