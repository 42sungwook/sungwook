# .github/workflows/deploy-home.yml
name: Deploy Home to AWS

on:
  push:
    branches: [home]
  pull_request:
    branches: [home]

env:
  NODE_VERSION: '18'
  BUN_VERSION: 'latest'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/home'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build home application
        run: |
          cd apps/home
          echo "🏗️ Building Next.js application..."
          bun run build

          echo "📁 Checking standalone build:"
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build found"
            ls -la .next/standalone/
          else
            echo "❌ Standalone build not found"
            echo "Available files in .next:"
            ls -la .next/
            exit 1
          fi

          echo "📁 Preparing deployment package..."
          mkdir -p ../../dist
          cp -r .next/standalone ../../dist/home

          if [ -d "public" ] && [ ! -d "../../dist/home/public" ]; then
            cp -r public ../../dist/home/
          fi

          echo "📁 Final deployment package:"
          ls -la ../../dist/home/

          # .next 폴더 확인
          echo "📁 Checking .next folder:"
          find ../../dist/home -name ".next" -type d -exec ls -la {} \;

          echo "📊 Package size:"
          du -sh ../../dist/home/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS S3
        run: |
          echo "🚀 Uploading build to S3..."

          # 타임스탬프 생성
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BUILD_PATH="builds/$TIMESTAMP"

          # S3에 빌드 파일 업로드 - 전체 구조 그대로
          aws s3 sync dist/home s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/ \
            --delete \
            --quiet

          echo "✅ Build uploaded to s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/"

          # 최신 빌드 경로 저장
          echo "$BUILD_PATH" | aws s3 cp - s3://${{ secrets.HOME_S3_BUCKET_NAME }}/latest-build.txt

          echo "📝 Latest build path saved"

      - name: Deploy to EC2
        run: |
          echo "🚀 Deploying to EC2..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.HOME_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "#!/bin/bash",
              "set -e",
              
              "# ubuntu 사용자로 전환",
              "sudo -u ubuntu bash << '\''USERSCRIPT'\''",
              "set -e",
              "echo \"Starting deployment...\"",
              
              "# 앱 디렉토리로 이동",
              "cd /home/ubuntu/app",
              
              "# S3에서 최신 빌드 경로 가져오기",
              "BUILD_PATH=$(aws s3 cp s3://${{ secrets.HOME_S3_BUCKET_NAME }}/latest-build.txt -)",
              "echo \"Downloading build: $BUILD_PATH\"",
              
              "# 기존 빌드 백업",
              "if [ -d \"current\" ]; then",
              "  rm -rf backup",
              "  mv current backup",
              "fi",
              
              "# 새 빌드 다운로드 - 전체 구조 그대로",
              "mkdir -p current",
              "aws s3 sync s3://${{ secrets.HOME_S3_BUCKET_NAME }}/$BUILD_PATH/ ./current/",
              
              "# 폴더 구조 확인",
              "echo \"Current folder structure:\"",
              "ls -la current/",
              
              "# 작업 디렉토리 찾기",
              "if [ -f \"current/server.js\" ]; then",
              "  WORK_DIR=\"/home/ubuntu/app/current\"",
              "elif [ -f \"current/apps/home/server.js\" ]; then",
              "  WORK_DIR=\"/home/ubuntu/app/current/apps/home\"",
              "else",
              "  echo \"❌ server.js not found\"",
              "  find current -name \"server.js\" -type f",
              "  exit 1",
              "fi",
              
              "echo \"Working directory: $WORK_DIR\"",
              "cd $WORK_DIR",
              
              "# 의존성 설치",
              "echo \"Installing dependencies...\"",
              "npm install --production",
              
              "# PM2로 앱 재시작",
              "echo \"Restarting app...\"",
              "pm2 stop home-app 2>/dev/null || true",
              "pm2 delete home-app 2>/dev/null || true",
              
              "# 환경변수와 함께 시작",
              "PORT=3000 NODE_ENV=production pm2 start server.js --name home-app --cwd $WORK_DIR",
              
              "# PM2 설정 저장",
              "pm2 save",
              "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
              
              "echo \"✅ Deployment completed\"",
              "pm2 status",
              
              "USERSCRIPT"
            ]' \
            --comment "Deploy home application" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # 배포 상태 확인
          echo "⏳ Waiting for deployment..."
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")
            
            echo "Status: $STATUS (check $i/30)"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment successful"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' \
                --output text
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Deployment failed"
              echo "Error:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardErrorContent' \
                --output text
              echo "Output:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.HOME_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' \
                --output text
              exit 1
            fi
            
            sleep 20
          done

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          sleep 15

          if [ -n "${{ secrets.HOME_APP_URL }}" ]; then
            echo "Checking app at ${{ secrets.HOME_APP_URL }}"
            for i in {1..10}; do
              if curl -f -s -o /dev/null "${{ secrets.HOME_APP_URL }}"; then
                echo "✅ App is live at: ${{ secrets.HOME_APP_URL }}"
                break
              else
                echo "⏳ Waiting for app... (attempt $i/10)"
                if [ $i -eq 10 ]; then
                  echo "❌ App health check failed"
                  exit 1
                fi
                sleep 10
              fi
            done
          fi

          echo "🎉 Deployment complete!"

  test-home:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run home linting
        continue-on-error: true
        run: |
          echo "🔍 Linting home application..."
          if bunx nx lint home --help > /dev/null 2>&1; then
            bunx nx lint home
          else
            echo "ℹ️ No linting configured"
          fi

      - name: Build check for home
        run: |
          echo "🏗️ Build check for home..."
          cd apps/home
          bun run build

          if [ -d ".next/standalone" ]; then
            echo "✅ Build check passed"
            ls -la .next/standalone/
          else
            echo "❌ Build check failed"
            ls -la .next/
            exit 1
          fi
